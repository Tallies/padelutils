syntax = "proto3";  

package padelutils.v1;

option go_package = "padelutils/gen/padel/v1"; 

import "google/protobuf/timestamp.proto";

service PadelMatchService {
  rpc StartMatch(StartMatchRequest) returns (MatchInfoResponse);
  rpc GetMatches(MatchesRequest) returns (MatchesResponse);
  rpc GetMatch(MatchRequest) returns (MatchInfoResponse);
  rpc ScorePointForA(MatchRequest) returns (MatchInfoResponse);
  rpc ScorePointForB(MatchRequest) returns (MatchInfoResponse);
  rpc ScoreGameForA(MatchRequest) returns (MatchInfoResponse);
  rpc ScoreGameForB(MatchRequest) returns (MatchInfoResponse);
  rpc ScoreSetForA(MatchRequest) returns (MatchInfoResponse);
  rpc ScoreSetForB(MatchRequest) returns (MatchInfoResponse);
  rpc ReverseLastScore(MatchRequest) returns (MatchInfoResponse);
}

message StartMatchRequest {
  google.protobuf.Timestamp started_at = 1;
  optional string team_a_name = 2;
  optional string team_b_name = 3;
  optional string tournament_id = 4;
  PadelMatchSetup match_setup = 5;
  PadelSetSetup set_setup = 6;
  PadelGameSetup game_setup = 7;
}

message MatchInfoResponse {
  google.protobuf.Timestamp started_at = 1;
  google.protobuf.Timestamp updated_at = 2;
  string match_id = 3; //UUID
  string team_a_name = 4;
  string team_b_name = 5;
  string tournament_id = 6;
  PadelMatch match = 7;
  PadelSet set = 8;
  PadelGame game = 9;
}

message MatchesRequest {
  string match_id = 1;
}

message MatchesResponse {
  repeated MatchInfoResponse Matches = 1;
}

message MatchRequest {
  string match_id = 1;   // identify which match instance to act on
}

message PadelMatchSetup {
  PadelMatchType padel_match_type = 1;
}

message PadelSetSetup {
  PadelSetType padel_set_type = 1;
  optional int32 setup_number = 2;
}

message PadelGameSetup {
  PadelGameType padel_game_type = 1;
  optional int32 setup_number = 2;
}

message PadelMatch {
  PadelMatchType type = 1;
  string team_a_score = 2;
  string team_b_score = 3;
  bool is_complete = 4;
}

message PadelSet {
  PadelSetType type = 1;
  string team_a_score = 2;
  string team_b_score = 3;
  bool is_complete = 4;
}

message PadelGame {
  PadelGameType type = 1;
  string team_a_score = 2;
  string team_b_score = 3;
  bool is_complete = 4;
}


enum PadelMatchType {
  STANDARD_MATCH = 0;
  ONESET_MATCH = 1;
}

enum PadelSetType {
  STANDARD_SET = 0;
  FIRSTTO_SET = 1;
  BESTOF_SET = 2;
}

enum PadelGameType {
  ADVANTAGE_GAME = 0;
  STARPOINT_GAME = 1;
  ONEDEUCE_GAME = 2;
  GOLDENPOINT_GAME = 3;
  RALLYSCORING_GAME = 4;
}
